server.port=8083

spring.application.name=store-management-system
spring.application.base-url=localhost:8083
spring.application.auth-domain=localhost

# Front-end Configuration
application.frontend.base-url=localhost:5173

# DB Configuration
spring.datasource.url= jdbc:postgresql://localhost:5432/store_management_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Logging Configuration
spring.main.banner-mode=off
logging.level.org.springframework=OFF
logging.level.org.hibernate=OFF
logging.level.org.apache=OFF
logging.level.com.zaxxer.hikari=OFF
spring.devtools.restart.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


# JWT Configuration
jwt.issuer=auth-service
jwt.expiration=7
jwt.refresh-token-expiration=14
jwt.private-key=classpath:keys/private.pem
jwt.public-key=classpath:keys/public.pem

# SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=manduong2k2@gmail.com
spring.mail.password=skqrsdjbdxpgdjht

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5673
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms